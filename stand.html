<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Информация о стенде — Портал экспонентов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <header id="header"></header>
  <div class="header-spacer"></div>

  <div class="portal-layout">
    <div id="sidebar" class="sidebar"></div>
    <div class="content-area">

      <div class="card">
        <div class="card-header">🏢 Информация о стенде</div>
        <div class="card-body">
          <p class="section-subtitle">Заполните информацию о вашем стенде. Эти данные используются для оформления и планирования.</p>

          <form id="standForm" onsubmit="saveStand(event)">

            <div class="form-group">
              <label class="form-label">Номер стенда</label>
              <input type="text" id="standNumber" class="form-control" placeholder="Например: A0, B12, C5" style="max-width:250px">
            </div>

            <div class="form-group">
              <label class="form-label">Тип стенда</label>
              <div class="stand-type-grid" style="margin-top:8px;">
                <div class="construction-card" data-value="linear" onclick="selectStandType('linear')">
                  <div class="icon">⬜</div>
                  <div class="card-label">Линейный</div>
                  <div class="card-desc">1 сторона открытая</div>
                </div>
                <div class="construction-card" data-value="corner" onclick="selectStandType('corner')">
                  <div class="icon">📐</div>
                  <div class="card-label">Угловой</div>
                  <div class="card-desc">2 стороны открытые</div>
                </div>
                <div class="construction-card" data-value="peninsula" onclick="selectStandType('peninsula')">
                  <div class="icon">🔲</div>
                  <div class="card-label">Полуостров</div>
                  <div class="card-desc">3 стороны открытые</div>
                </div>
                <div class="construction-card" data-value="island" onclick="selectStandType('island')">
                  <div class="icon">🔳</div>
                  <div class="card-label">Остров</div>
                  <div class="card-desc">4 стороны открытые</div>
                </div>
              </div>
              <input type="hidden" id="standType">
            </div>

            <div class="form-row" style="max-width:500px;margin-top:16px;">
              <div class="form-group">
                <label class="form-label">Длина, м</label>
                <input type="number" id="standLength" class="form-control" placeholder="0" min="1" max="100" step="0.5" oninput="calcArea()">
              </div>
              <div class="form-group">
                <label class="form-label">Ширина, м</label>
                <input type="number" id="standWidth" class="form-control" placeholder="0" min="1" max="100" step="0.5" oninput="calcArea()">
              </div>
              <div class="form-group">
                <label class="form-label">Площадь, м²</label>
                <input type="number" id="standArea" class="form-control" placeholder="0" readonly style="background:#f8f9fa;">
              </div>
            </div>

            <div class="form-group" style="margin-top:8px;">
              <label class="form-label">Зал / Павильон</label>
              <input type="text" id="standHall" class="form-control" placeholder="Например: Чаянов, Павильон 1" style="max-width:350px">
            </div>

            <div class="form-group">
              <label class="form-label">Дополнительные примечания</label>
              <textarea id="standNotes" class="form-control" rows="3" placeholder="Особые требования или пожелания..." style="resize:vertical;"></textarea>
            </div>

            <div id="standMsg" class="alert" style="display:none;margin-top:10px;"></div>

            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <button type="submit" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Сохранить
              </button>
              <a href="construction.html" class="btn btn-secondary">Перейти к застройке →</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="dashboard.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Главная</a>
      <a href="stand.html" class="bottom-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Стенд</a>
      <a href="badges.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Бейджи</a>
      <a href="issues.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Проблемы</a>
      <a href="settings.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Настройки</a>
    </div>
  </nav>

  <footer id="footer"></footer>
  <div class="toast-container" id="toast-container"></div>

  <script src="js/app.js"></script>
  <script>
    let selectedType = '';

    document.addEventListener('DOMContentLoaded', () => {
      initPage({ activePage: 'stand', title: 'Стенд' });
      loadStand();
    });

    function selectStandType(val) {
      selectedType = val;
      document.getElementById('standType').value = val;
      document.querySelectorAll('.construction-card').forEach(c => c.classList.toggle('selected', c.dataset.value === val));
    }

    function calcArea() {
      const l = parseFloat(document.getElementById('standLength').value) || 0;
      const w = parseFloat(document.getElementById('standWidth').value) || 0;
      document.getElementById('standArea').value = l && w ? (l * w).toFixed(1) : '';
    }

    function loadStand() {
      const user = Auth.getUser();
      const data = Store.get('stand_' + user.id, {});
      if (data.standNumber) document.getElementById('standNumber').value = data.standNumber;
      if (data.type) selectStandType(data.type);
      if (data.length) document.getElementById('standLength').value = data.length;
      if (data.width) document.getElementById('standWidth').value = data.width;
      if (data.hall) document.getElementById('standHall').value = data.hall;
      if (data.notes) document.getElementById('standNotes').value = data.notes;
      calcArea();
    }

    function saveStand(e) {
      e.preventDefault();
      const user = Auth.getUser();
      const length = parseFloat(document.getElementById('standLength').value) || 0;
      const width = parseFloat(document.getElementById('standWidth').value) || 0;

      const data = {
        standNumber: document.getElementById('standNumber').value.trim(),
        type: document.getElementById('standType').value,
        length,
        width,
        area: length * width,
        hall: document.getElementById('standHall').value.trim(),
        notes: document.getElementById('standNotes').value.trim(),
        updatedAt: new Date().toISOString(),
      };

      Store.set('stand_' + user.id, data);

      // Update user's stand info
      const users = Store.get('users', []);
      const idx = users.findIndex(u => u.id === user.id);
      if (idx >= 0) {
        users[idx].standNumber = data.standNumber;
        users[idx].hall = data.hall;
        Store.set('users', users);
        const updatedUser = { ...user, standNumber: data.standNumber, hall: data.hall };
        Store.set('user', updatedUser);
      }

      Auth.log('stand_save', `Информация о стенде сохранена: ${data.standNumber || '—'}, ${data.type || '—'}`);
      Toast.show('Информация о стенде сохранена', 'success');
    }
  </script>
</body>
</html>
