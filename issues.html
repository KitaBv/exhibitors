<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Проблемы на стенде — Портал экспонентов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .issue-btn {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      transition: all 0.15s;
      width: 100%;
      font-family: inherit;
    }
    .issue-btn:hover { border-color: #dc3545; box-shadow: 0 4px 16px rgba(220,53,69,0.15); transform: translateY(-2px); }
    .issue-btn .issue-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
    .issue-btn .issue-label { font-weight: 700; font-size: 15px; display: block; margin-bottom: 4px; }
    .issue-btn .issue-desc { font-size: 12.5px; color: #666; display: block; }
    .issue-history-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .status-open { color: #dc3545; font-weight: 600; }
    .status-inprogress { color: #856404; font-weight: 600; }
    .status-resolved { color: #198754; font-weight: 600; }
    .confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .confirm-box { background: #fff; border-radius: 14px; padding: 2rem; max-width: 440px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <header id="header"></header>
  <div class="header-spacer"></div>

  <div class="portal-layout">
    <div id="sidebar" class="sidebar"></div>
    <div class="content-area">

      <!-- Emergency issues -->
      <div class="card">
        <div class="card-header" style="background:linear-gradient(135deg,#fff5f5,#fff);border-bottom-color:#fbd5d5;">
          <span style="color:#dc3545;">🚨 Сообщить о проблеме на стенде</span>
        </div>
        <div class="card-body">
          <div class="alert alert-danger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <div>Используйте этот раздел во время выставки для быстрого уведомления ответственных специалистов. Заявка будет обработана в приоритетном порядке.</div>
          </div>

          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px;">
            <button class="issue-btn" onclick="showIssueModal('electricity')">
              <span class="issue-icon">⚡</span>
              <span class="issue-label">Пропало электричество</span>
              <span class="issue-desc">Нет питания на стенде</span>
            </button>
            <button class="issue-btn" onclick="showIssueModal('water')">
              <span class="issue-icon">💧</span>
              <span class="issue-label">Проблема с водой</span>
              <span class="issue-desc">Нет воды / течёт / авария</span>
            </button>
            <button class="issue-btn" onclick="showIssueModal('cleaning')">
              <span class="issue-icon">🧹</span>
              <span class="issue-label">Нужна уборка</span>
              <span class="issue-desc">Уборка на стенде</span>
            </button>
            <button class="issue-btn" onclick="showIssueModal('other')">
              <span class="issue-icon">❗</span>
              <span class="issue-label">Другая проблема</span>
              <span class="issue-desc">Прочие вопросы</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Issue history -->
      <div class="card">
        <div class="card-header" style="justify-content:space-between;">
          <span>📋 История заявок</span>
          <button class="btn btn-outline btn-sm" onclick="loadIssues()">Обновить</button>
        </div>
        <div class="card-body" id="issuesHistory">
          <div style="text-align:center;padding:24px;color:#999;">
            <div style="font-size:2rem;margin-bottom:8px;">📭</div>
            <p>Заявки не отправлялись</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal -->
  <div id="issueModal" class="confirm-modal" style="display:none;">
    <div class="confirm-box">
      <h3 id="modalTitle" style="font-size:18px;font-weight:700;margin-bottom:8px;"></h3>
      <p id="modalDesc" style="color:#555;font-size:14px;margin-bottom:16px;"></p>
      <div class="form-group">
        <label class="form-label">Описание проблемы</label>
        <textarea id="issueComment" class="form-control" rows="3" placeholder="Уточните детали..." style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Стенд</label>
        <input type="text" id="issueStand" class="form-control" placeholder="Номер стенда" style="max-width:200px;">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
        <button class="btn btn-danger" onclick="submitIssue()">🚨 Отправить заявку</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="dashboard.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Главная</a>
      <a href="stand.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Стенд</a>
      <a href="badges.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Бейджи</a>
      <a href="issues.html" class="bottom-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Проблемы</a>
      <a href="settings.html" class="bottom-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Настройки</a>
    </div>
  </nav>

  <footer id="footer"></footer>
  <div class="toast-container" id="toast-container"></div>

  <script src="js/app.js"></script>
  <script>
    const ISSUE_TYPES = {
      electricity: { label: '⚡ Пропало электричество', desc: 'Специалист по электрике прибудет в течение 10-15 минут.' },
      water: { label: '💧 Проблема с водоподключением', desc: 'Сантехник будет уведомлен немедленно.' },
      cleaning: { label: '🧹 Нужна уборка на стенде', desc: 'Клининговая служба придёт в ближайшее время.' },
      other: { label: '❗ Другая проблема', desc: 'Ваша заявка будет передана дежурному менеджеру.' },
    };
    let currentIssueType = '';

    document.addEventListener('DOMContentLoaded', () => {
      initPage({ activePage: 'issues', title: 'Проблемы' });
      // Prefill stand number
      const user = Auth.getUser();
      const standData = Store.get('stand_' + user.id, {});
      document.getElementById('issueStand').value = user.standNumber || standData.standNumber || '';
      loadIssues();
    });

    function showIssueModal(type) {
      currentIssueType = type;
      const info = ISSUE_TYPES[type];
      document.getElementById('modalTitle').textContent = info.label;
      document.getElementById('modalDesc').textContent = info.desc;
      document.getElementById('issueComment').value = '';
      document.getElementById('issueModal').style.display = 'flex';
      setTimeout(() => document.getElementById('issueComment').focus(), 100);
    }

    function closeModal() {
      document.getElementById('issueModal').style.display = 'none';
    }

    function submitIssue() {
      const user = Auth.getUser();
      const issues = Store.get('issues', []);
      const issue = {
        id: 'issue_' + Date.now(),
        type: currentIssueType,
        label: ISSUE_TYPES[currentIssueType].label,
        comment: document.getElementById('issueComment').value.trim(),
        stand: document.getElementById('issueStand').value.trim(),
        userId: user.id,
        userEmail: user.email,
        company: user.company,
        status: 'open',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
      issues.unshift(issue);
      Store.set('issues', issues);
      Auth.log('issue', `Заявка: ${issue.label}, стенд ${issue.stand}`);
      closeModal();
      loadIssues();
      Toast.show('Заявка отправлена! Специалисты уже уведомлены.', 'success', 5000);
    }

    function loadIssues() {
      const user = Auth.getUser();
      const all = Store.get('issues', []);
      const myIssues = user.role === 'admin' ? all : all.filter(i => i.userId === user.id);

      const el = document.getElementById('issuesHistory');
      if (!myIssues.length) {
        el.innerHTML = `<div style="text-align:center;padding:24px;color:#999;"><div style="font-size:2rem;margin-bottom:8px;">📭</div><p>Заявки не отправлялись</p></div>`;
        return;
      }

      const statusMap = { open: ['Открыта', 'status-open'], inprogress: ['В работе', 'status-inprogress'], resolved: ['Решена', 'status-resolved'] };

      el.innerHTML = myIssues.map(i => {
        const [sLabel, sClass] = statusMap[i.status] || ['Открыта', 'status-open'];
        return `
          <div class="issue-history-item">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
              <div>
                <div style="font-weight:600;font-size:14px;">${escHtml(i.label)}</div>
                ${i.comment ? `<div style="font-size:13px;color:#555;margin-top:2px;">${escHtml(i.comment)}</div>` : ''}
                <div style="font-size:12px;color:#999;margin-top:4px;">${formatDateTime(i.createdAt)}${i.stand ? ' · Стенд ' + escHtml(i.stand) : ''}${user.role === 'admin' ? ' · ' + escHtml(i.company || i.userEmail) : ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                <span class="${sClass}" style="font-size:13px;">${sLabel}</span>
                ${user.role === 'admin' ? `<select onchange="updateIssueStatus('${i.id}',this.value)" class="form-select" style="width:auto;padding:4px 28px 4px 8px;font-size:12px;">
                  <option value="open" ${i.status==='open'?'selected':''}>Открыта</option>
                  <option value="inprogress" ${i.status==='inprogress'?'selected':''}>В работе</option>
                  <option value="resolved" ${i.status==='resolved'?'selected':''}>Решена</option>
                </select>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateIssueStatus(id, status) {
      const issues = Store.get('issues', []);
      const i = issues.find(x => x.id === id);
      if (i) { i.status = status; i.updatedAt = new Date().toISOString(); }
      Store.set('issues', issues);
      loadIssues();
      Toast.show('Статус заявки обновлён', 'success');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
